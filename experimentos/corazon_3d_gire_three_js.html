<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Corazón 3D Giratorio</title>
<style>
  html, body { margin: 0; padding: 0; overflow: hidden; background: #111; }
  canvas { display: block; }
</style>
</head>
<body>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";

// --- Escena, cámara y renderer: NO reescribir salvo que el jefe pida
// explícitamente cambiar el fondo, el campo de visión o desactivar
// sombras/controles. ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);

const camera = new THREE.PerspectiveCamera(
  50, window.innerWidth / window.innerHeight, 0.1, 100
);
camera.position.set(0, 1.5, 6);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

// --- Luces: base razonable para que cualquier geometría se vea con
// volumen (luz ambiental para que nada quede totalmente negro + luz
// direccional con sombra para dar relieve). Ajustar intensidad/color
// si el jefe lo pide, pero mantener AMBAS luces. ---
const luzAmbiental = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(luzAmbiental);

const luzDireccional = new THREE.DirectionalLight(0xffffff, 1.2);
luzDireccional.position.set(3, 5, 4);
luzDireccional.castShadow = true;
// Configurar la cámara de la sombra para la luz direccional
luzDireccional.shadow.mapSize.width = 1024;
luzDireccional.shadow.mapSize.height = 1024;
luzDireccional.shadow.camera.near = 0.5;
luzDireccional.shadow.camera.far = 50;
luzDireccional.shadow.camera.left = -5;
luzDireccional.shadow.camera.right = 5;
luzDireccional.shadow.camera.top = 5;
luzDireccional.shadow.camera.bottom = -5;
scene.add(luzDireccional);

// Añadir un plano para que el corazón proyecte su sombra
const planeGeometry = new THREE.PlaneGeometry(10, 10);
const planeMaterial = new THREE.MeshStandardMaterial({ color: 0x333333, side: THREE.DoubleSide });
const plane = new THREE.Mesh(planeGeometry, planeMaterial);
plane.rotation.x = Math.PI / 2; // Rotar para que sea horizontal
plane.position.y = -1.5; // Posicionar por debajo del corazón
plane.receiveShadow = true; // El plano recibe sombras
scene.add(plane);

// --- Controles de mouse (orbit): ya cableados. Si el jefe NO pidió
// interactividad, se puede dejar igual (no estorba) o quitar este
// bloque completo. ---
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// ============================================================
// TODO: reemplazar este placeholder por la geometría/objeto REAL que
// pidió el jefe. Si pidió una forma compleja (ej. un corazón, una
// estrella, un logo), usa THREE.Shape() + ExtrudeGeometry para tener
// volumen real en vez de una geometría primitiva genérica — NO se vale
// aproximar una forma pedida con una esfera/cubo/cono si la forma real
// es reconocible (ej. un corazón NO es una esfera aplastada).
// ============================================================

// --- Crear la forma 2D del corazón ---
const heartShape = new THREE.Shape();
const x = 0, y = 0; // Punto de referencia para la construcción de la forma

// Escala general para el tamaño del corazón
const heartScale = 0.8;

// Definición de la forma del corazón utilizando curvas cuadráticas
// Estas coordenadas crean un corazón estilizado.
heartShape.moveTo( x + 0, y - 0.8 * heartScale ); // Punto inferior
heartShape.quadraticCurveTo( x + 0.8 * heartScale, y - 1.2 * heartScale, x + 1.6 * heartScale, y - 0.8 * heartScale );
heartShape.quadraticCurveTo( x + 2.0 * heartScale, y + 0.0 * heartScale, x + 1.2 * heartScale, y + 1.2 * heartScale );
heartShape.quadraticCurveTo( x + 0.8 * heartScale, y + 1.6 * heartScale, x + 0.0 * heartScale, y + 2.0 * heartScale ); // Punto superior central
heartShape.quadraticCurveTo( x - 0.8 * heartScale, y + 1.6 * heartScale, x - 1.2 * heartScale, y + 1.2 * heartScale );
heartShape.quadraticCurveTo( x - 2.0 * heartScale, y + 0.0 * heartScale, x - 1.6 * heartScale, y - 0.8 * heartScale );
heartShape.quadraticCurveTo( x - 0.8 * heartScale, y - 1.2 * heartScale, x + 0.0 * heartScale, y - 0.8 * heartScale ); // De vuelta al punto inferior

// --- Configuración de la extrusión para dar volumen ---
const extrudeSettings = {
  depth: 0.4, // Profundidad del corazón
  bevelEnabled: true,
  bevelSegments: 4, // Más segmentos para un bisel (borde redondeado) más suave
  steps: 2,
  bevelSize: 0.1, // Tamaño del bisel
  bevelThickness: 0.1 // Grosor del bisel
};

// --- Crear la geometría 3D del corazón ---
const heartGeometry = new THREE.ExtrudeGeometry(heartShape, extrudeSettings);

// Centrar la geometría para que el corazón gire alrededor de su propio centro
heartGeometry.center();

// --- Material del corazón ---
const heartMaterial = new THREE.MeshStandardMaterial({
  color: 0xcc0033, // Un color rojo vibrante
  roughness: 0.4, // Suavidad de la superficie (0=espejo, 1=mate)
  metalness: 0.1 // Qué tan metálica es la superficie
});

// --- Crear el objeto Mesh del corazón ---
const objeto = new THREE.Mesh(heartGeometry, heartMaterial);
objeto.castShadow = true; // El corazón proyecta sombras
objeto.receiveShadow = true; // El corazón también puede recibir sombras
scene.add(objeto);

// --- Resize: NO quitar, evita que la escena se vea deformada si la
// ventana cambia de tamaño. ---
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// --- Loop de animación: si el jefe pidió rotación/animación, agrégala
// aquí (ej. objeto.rotation.y += 0.01). controls.update() es
// obligatorio si enableDamping está activo. ---
function animate() {
  requestAnimationFrame(animate);

  // Animación de rotación continua del corazón sobre su eje Y
  objeto.rotation.y += 0.005; // Velocidad de rotación

  controls.update(); // Obligatorio si enableDamping está activo
  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
