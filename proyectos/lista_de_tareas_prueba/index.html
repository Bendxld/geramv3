<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Tareas Moderna</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>Mi Lista de Tareas</h1>
        <div class="task-input-section">
            <input type="text" id="newTaskInput" placeholder="Añade una nueva tarea...">
            <button id="addTaskButton">Agregar Tarea</button>
        </div>
        <ul id="taskList">
            <!-- Las tareas se añadirán aquí dinámicamente con JavaScript -->
        </ul>
    </div>
    <script src="js/main.js"></script>
</body>
</html>
